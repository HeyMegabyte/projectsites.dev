<div class="fixed inset-0 z-[9999] flex flex-col bg-[#0f0f23]">
  <div class="flex items-center justify-between px-4 h-12 min-h-[48px] bg-dark-surface border-b border-primary/[0.15] z-10">
    <div class="flex items-center gap-2 text-[#e0e0ff] text-sm font-semibold">
      <button class="flex items-center justify-center w-7 h-7 border-none bg-primary/[0.08] rounded-md text-primary cursor-pointer transition-colors hover:bg-primary/[0.18]" (click)="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
      </svg>
      @if (site()) {
        <span>AI Editor — {{ site()!.business_name }}</span>
      } @else {
        <span>AI Editor</span>
      }
    </div>
    <div class="flex items-center gap-2">
      @if (boltGenerating()) {
        <span class="text-xs text-primary animate-pulse">Generating...</span>
      }
      @if (saving()) {
        <span class="text-xs text-primary animate-pulse">Saving...</span>
      }
      <button class="inline-flex items-center gap-1.5 border border-primary/30 bg-primary/[0.15] text-primary rounded-md py-1.5 px-3 text-xs font-semibold cursor-pointer transition-all hover:bg-primary/25 disabled:opacity-50 disabled:cursor-not-allowed" (click)="saveAndDeploy()" [disabled]="!boltReady() || boltGenerating() || saving()">
        Save &amp; Deploy
      </button>
      <button class="inline-flex items-center gap-1.5 border border-white/20 bg-transparent text-gray-400 rounded-md py-1.5 px-3 text-xs font-semibold cursor-pointer transition-all hover:text-light hover:border-white/40" (click)="openFullscreen()">
        Open Full Editor
      </button>
    </div>
  </div>

  @if (!boltReady()) {
    <div class="absolute inset-x-0 top-12 bottom-0 flex flex-col items-center justify-center gap-4 text-gray-400 text-sm z-[5]">
      <div class="spinner"></div>
      <span>Loading AI Editor...</span>
    </div>
  }

  @if (iframeUrl()) {
    <iframe
      [src]="iframeUrl()!"
      class="flex-1 w-full border-none bg-[#1a1a2e]"
      allow="clipboard-write"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
    ></iframe>
  }
</div>
