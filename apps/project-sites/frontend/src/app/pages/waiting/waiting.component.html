<section class="screen-waiting">
  <div class="waiting-card">
    @if (status() === 'published') {
      <!-- Success state -->
      <div class="waiting-success-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h2 class="waiting-title waiting-title-success">Your site is live!</h2>
      <p class="waiting-subtitle">{{ slug }}.projectsites.dev</p>

      <div class="waiting-success-actions">
        <button class="btn btn-accent btn-large" (click)="viewSite()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          View Your Site
        </button>
        <button class="btn btn-glass" (click)="editWithAI()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>
          Edit with AI
        </button>
      </div>

      <div class="waiting-actions">
        <button class="btn btn-secondary-outline" (click)="goAdmin()">Go to Dashboard</button>
      </div>
    } @else {
      <!-- Building state -->
      <div class="waiting-spinner">
        <div class="spinner"></div>
      </div>
      <h2 class="waiting-title">Preparing your project...</h2>
      <p class="waiting-subtitle">{{ statusMessage() }}</p>
      <p class="waiting-step">{{ stepProgress() }}</p>

      <div class="waiting-progress-bar">
        <div class="waiting-progress-fill" [style.width.%]="(currentStep() / totalSteps) * 100"></div>
      </div>

      @if (status() === 'error') {
        <div class="waiting-error">
          <p>Something went wrong. Please try again.</p>
          <button class="btn btn-secondary-outline" (click)="goHome()">Try Again</button>
        </div>
      }

      <div class="waiting-actions">
        <button class="btn btn-secondary-outline" (click)="goAdmin()">Go to Dashboard</button>
      </div>
    }
  </div>
</section>
