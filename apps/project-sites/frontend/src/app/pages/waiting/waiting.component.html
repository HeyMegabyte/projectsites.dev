<section class="min-h-[calc(100vh-60px)] flex items-center justify-center p-6 relative z-[1]">
  <div class="text-center max-w-[400px] animate-[fadeIn_0.4s_ease]">
    @if (status() === 'published') {
      <!-- Success state -->
      <div class="mx-auto mb-5 text-center animate-[fadeIn_0.5s_ease]">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-green-400 mb-2">Your site is live!</h2>
      <p class="text-[0.85rem] text-gray-500 mb-2">{{ slug }}.projectsites.dev</p>

      <div class="flex gap-3 justify-center my-6 flex-wrap">
        <button class="inline-flex items-center gap-2 text-[0.85rem] py-2.5 px-6 rounded-[10px] font-semibold cursor-pointer transition-all border-none bg-gradient-to-r from-green-400 to-green-500 text-black hover:-translate-y-px hover:shadow-[0_4px_20px_rgba(74,222,128,0.3)]" (click)="viewSite()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          View Your Site
        </button>
        <button class="inline-flex items-center gap-2 text-[0.85rem] py-2.5 px-6 rounded-[10px] font-semibold cursor-pointer transition-all bg-white/[0.06] text-primary border border-primary/20 hover:bg-primary/[0.1] hover:border-primary/40" (click)="editWithAI()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>
          Edit with AI
        </button>
      </div>

      <div class="mt-4">
        <button class="border border-white/[0.08] bg-transparent text-text-secondary rounded-xl px-6 py-3 font-semibold transition-all hover:border-primary hover:text-primary" (click)="goAdmin()">Go to Dashboard</button>
      </div>
    } @else {
      <!-- Building state -->
      <div class="mx-auto mb-6">
        <div class="spinner"></div>
      </div>
      <h2 class="text-xl font-bold text-light mb-2">Preparing your project...</h2>
      <p class="text-[0.85rem] text-gray-500 mb-2 leading-normal">{{ statusMessage() }}</p>
      <p class="text-[0.75rem] text-gray-600 mb-4 font-medium tracking-wide">{{ stepProgress() }}</p>

      <div class="w-full h-1 bg-primary/[0.1] rounded-sm overflow-hidden mb-6">
        <div class="waiting-progress-fill h-full bg-gradient-to-r from-primary to-purple-500 rounded-sm" [style.width.%]="(currentStep() / totalSteps) * 100"></div>
      </div>

      @if (status() === 'error') {
        <div class="mt-4">
          <p class="text-red-500 text-[0.9rem] mb-3">Something went wrong. Please try again.</p>
          <button class="border border-white/[0.08] bg-transparent text-text-secondary rounded-xl px-6 py-3 font-semibold transition-all hover:border-primary hover:text-primary" (click)="goHome()">Try Again</button>
        </div>
      }

      <div class="mt-4">
        <button class="border border-white/[0.08] bg-transparent text-text-secondary rounded-xl px-6 py-3 font-semibold transition-all hover:border-primary hover:text-primary" (click)="goAdmin()">Go to Dashboard</button>
      </div>
    }
  </div>
</section>
