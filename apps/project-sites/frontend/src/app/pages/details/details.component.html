<div class="fixed inset-0 bg-black/75 backdrop-blur-xl z-[500] flex items-start justify-center animate-[fadeIn_0.15s_ease] overflow-y-auto p-6">
  <div class="w-full max-w-[600px] mt-20 mb-5 mx-auto bg-gradient-to-br from-[rgba(13,13,40,0.98)] to-dark border border-primary/[0.1] rounded-2xl py-10 px-9 animate-[fadeInScale_0.3s_cubic-bezier(0.34,1.56,0.64,1)] relative shadow-[0_16px_48px_rgba(0,0,0,0.5),0_0_60px_rgba(0,229,255,0.03)]">
    <button class="absolute top-3.5 right-3.5 bg-white/[0.04] border border-white/[0.06] text-gray-500 cursor-pointer py-1 px-2 text-xl leading-none z-[2] transition-all rounded-lg hover:text-light hover:bg-red-500/[0.08] hover:scale-110 active:scale-95" (click)="goBack()" aria-label="Close">&times;</button>
    <h2 class="text-2xl font-[800] mb-2 text-white">Almost there</h2>
    <p class="text-[0.88rem] text-text-secondary mb-6">Tell us about your business so we can build the perfect site.</p>

    <!-- Selected business badge -->
    @if (mode() === 'business' && business()) {
      <div class="flex items-center gap-3 p-3 px-4 bg-primary/[0.1] border border-primary/[0.12] rounded-xl mb-6 transition-colors hover:border-primary/25">
        <div class="w-9 h-9 rounded-lg bg-primary/[0.1] flex items-center justify-center flex-shrink-0">
          <svg class="text-primary" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" />
          </svg>
        </div>
        <div class="text-left">
          <div class="text-[0.9rem] font-semibold text-primary">{{ business()!.name }}</div>
          <div class="text-[0.78rem] text-gray-500">{{ business()!.address }}</div>
        </div>
        <button class="ml-auto flex-shrink-0 w-7 h-7 flex items-center justify-center rounded-md border-none bg-white/[0.06] text-gray-500 cursor-pointer p-0 transition-all hover:bg-red-500/[0.15] hover:text-red-500 hover:scale-110 active:scale-95" (click)="dismissBusiness()" aria-label="Remove">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
    }

    <!-- Manual entry fields -->
    @if (mode() === 'custom' || !business()) {
      <div class="mb-5 text-left">
        <label class="block text-[0.85rem] font-semibold text-light mb-1.5" for="business-name">Business Name</label>
        <input
          id="business-name"
          type="text"
          class="w-full py-3 px-4 text-[0.95rem] font-sans bg-dark-surface border border-white/[0.08] rounded-xl text-light outline-none transition-all placeholder:text-gray-500 hover:border-primary/[0.15] focus:border-primary focus:shadow-[0_0_0_3px_rgba(0,229,255,0.12)]"
          placeholder="e.g., Vito's Salon"
          [(ngModel)]="businessName"
        />
      </div>

      <div class="mb-5 text-left">
        <label class="block text-[0.85rem] font-semibold text-light mb-1.5" for="business-address">Business Address</label>
        <input
          id="business-address"
          type="text"
          class="w-full py-3 px-4 text-[0.95rem] font-sans bg-dark-surface border border-white/[0.08] rounded-xl text-light outline-none transition-all placeholder:text-gray-500 hover:border-primary/[0.15] focus:border-primary focus:shadow-[0_0_0_3px_rgba(0,229,255,0.12)]"
          placeholder="e.g., 123 Main St, New York, NY"
          [(ngModel)]="businessAddress"
        />
      </div>
    }

    <!-- Additional context -->
    <div class="mb-5 text-left">
      <label class="block text-[0.85rem] font-semibold text-light mb-1.5" for="details-textarea">
        Additional Context
        <span class="font-normal text-[0.75rem] text-gray-500 normal-case tracking-normal">(optional)</span>
      </label>
      <textarea
        id="details-textarea"
        class="w-full py-3 px-4 text-[0.95rem] font-sans bg-dark-surface border border-white/[0.08] rounded-xl text-light outline-none transition-all placeholder:text-gray-500 hover:border-primary/[0.15] focus:border-primary focus:shadow-[0_0_0_3px_rgba(0,229,255,0.12)] min-h-[210px] resize-y"
        placeholder="Describe your business, services, style preferences, colors..."
        [(ngModel)]="additionalContext"
        maxlength="5000"
      ></textarea>
      <span class="block text-[0.75rem] text-gray-500 text-right mt-1">{{ additionalContext.length }} / 5000</span>
    </div>

    <!-- Submit -->
    <button
      class="w-full bg-primary text-dark font-semibold rounded-xl px-6 py-4 text-[1.05rem] hover:brightness-110 hover:shadow-[0_0_24px_rgba(0,229,255,0.4)] transition-all disabled:opacity-50 disabled:cursor-not-allowed"
      [disabled]="submitting()"
      (click)="submitBuild()"
    >
      @if (submitting()) {
        <span class="loading-dots"><span></span><span></span><span></span></span>
        Building...
      } @else {
        Build My Website
      }
    </button>
  </div>
</div>
