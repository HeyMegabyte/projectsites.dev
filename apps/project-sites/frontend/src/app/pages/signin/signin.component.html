<section class="px-6 pb-[60px] text-center relative z-[1] min-h-[calc(100vh-60px)] flex flex-col items-center justify-center gap-4">
  <div class="w-full max-w-[440px] bg-gradient-to-br from-[rgba(13,13,40,0.95)] to-[rgba(8,8,32,0.98)] border border-primary/[0.12] rounded-2xl py-11 px-9 animate-[fadeInScale_0.4s_cubic-bezier(0.34,1.56,0.64,1)] shadow-[0_8px_32px_rgba(0,0,0,0.4),0_0_60px_rgba(0,229,255,0.03)] relative z-[1] backdrop-blur-2xl">
    <h2 class="text-[1.6rem] font-[800] mb-2 bg-gradient-to-r from-white to-primary bg-clip-text text-transparent">Welcome</h2>
    <p class="text-[0.9rem] text-text-secondary mb-8 leading-normal">Sign in to get your AI-powered website</p>

    @if (panel() === 'main') {
      <div class="flex flex-col gap-3.5">
        <!-- Google -->
        <button class="signin-btn-google flex items-center justify-center gap-3 w-full py-[15px] px-5 rounded-xl text-[0.95rem] font-semibold cursor-pointer transition-all border hover:-translate-y-0.5" (click)="signInWithGoogle()">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Continue with Google</span>
        </button>

        <!-- GitHub -->
        <button class="flex items-center justify-center gap-3 w-full py-[15px] px-5 rounded-xl text-[0.95rem] font-semibold cursor-pointer transition-all border border-white/[0.12] bg-[#161b22] text-white hover:-translate-y-0.5 hover:border-white/25 hover:bg-[#1c2129] hover:shadow-[0_6px_24px_rgba(0,0,0,0.3)]" (click)="signInWithGitHub()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          <span>Continue with GitHub</span>
        </button>

        <div class="flex items-center gap-4 my-4 text-gray-500 text-[0.75rem] uppercase tracking-[0.1em] font-medium">
          <span class="flex-1 h-px bg-gradient-to-r from-transparent via-primary/[0.12] to-transparent"></span>
          <span>or</span>
          <span class="flex-1 h-px bg-gradient-to-r from-transparent via-primary/[0.12] to-transparent"></span>
        </div>

        <!-- Email -->
        <button class="flex items-center justify-center gap-3 w-full py-[15px] px-5 rounded-xl text-[0.95rem] font-semibold cursor-pointer transition-all border border-primary/[0.1] bg-gradient-to-br from-[rgba(8,8,32,0.8)] to-[rgba(13,13,40,0.6)] text-light hover:-translate-y-0.5 hover:border-primary/25 hover:shadow-[0_6px_24px_rgba(0,0,0,0.3)]" (click)="showEmailPanel()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
          <span>Continue with Email</span>
        </button>
      </div>
    }

    @if (panel() === 'email') {
      <div class="animate-fade-in-up">
        @if (!sent()) {
          <div class="mb-5 text-left">
            <label class="block text-[0.85rem] font-semibold text-light mb-1.5" for="signin-email">Email Address</label>
            <input
              id="signin-email"
              type="email"
              autocomplete="email"
              class="w-full py-3 px-4 text-[0.95rem] font-sans bg-dark-surface border border-white/[0.08] rounded-xl text-light outline-none transition-all placeholder:text-gray-500 hover:border-primary/[0.15] focus:border-primary focus:shadow-[0_0_0_3px_rgba(0,229,255,0.12)]"
              placeholder="you@example.com"
              [(ngModel)]="email"
              (keyup.enter)="sendMagicLink()"
            />
          </div>
          <button
            class="w-full bg-primary text-dark font-semibold rounded-xl px-6 py-3.5 text-base hover:brightness-110 hover:shadow-[0_0_24px_rgba(0,229,255,0.4)] transition-all disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="sending() || !email"
            (click)="sendMagicLink()"
          >
            @if (sending()) {
              Sending...
            } @else {
              Send Magic Link
            }
          </button>
        } @else {
          <div class="py-2.5 px-3.5 rounded-lg text-[0.85rem] mt-3 text-left bg-green-500/[0.1] text-green-500 border border-green-500/[0.2]">
            Check your email! We sent a sign-in link to <strong>{{ email }}</strong>
          </div>
        }
        <button class="inline-flex items-center gap-1.5 text-[0.85rem] text-gray-500 cursor-pointer mt-5 bg-transparent border-none font-sans transition-all hover:text-primary hover:gap-2" (click)="backToMain()">
          <svg class="transition-transform hover:-translate-x-[3px]" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m15 18-6-6 6-6" />
          </svg>
          Back to sign-in options
        </button>
      </div>
    }
  </div>

  <button class="inline-flex items-center gap-1.5 text-[0.85rem] text-gray-500 cursor-pointer bg-transparent border-none font-sans transition-all hover:text-primary hover:gap-2" (click)="goBack()">
    <svg class="transition-transform hover:-translate-x-[3px]" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="m15 18-6-6 6-6" />
    </svg>
    Back to search
  </button>

  <!-- Footer -->
  <div class="fixed bottom-0 left-0 right-0 py-3.5 px-4 flex flex-col items-center gap-2.5 opacity-70 hover:opacity-100 transition-opacity bg-gradient-to-t from-dark/95 to-transparent border-t border-primary/[0.04] z-10 backdrop-blur-xl">
    <div class="flex gap-[18px]">

      <a class="text-white flex transition-all hover:scale-[1.15] hover:-translate-y-0.5" href="https://x.com/HeyMegabyte" target="_blank" rel="noopener noreferrer" aria-label="X"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
      <a class="text-white flex transition-all hover:scale-[1.15] hover:-translate-y-0.5 hover:text-[#0A66C2]" href="https://www.linkedin.com/in/blzalewski" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>
      <a class="text-white flex transition-all hover:scale-[1.15] hover:-translate-y-0.5 hover:text-[#FF0000]" href="https://www.youtube.com/@HeyMegabyte" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>
      <a class="text-white flex transition-all hover:scale-[1.15] hover:-translate-y-0.5 hover:text-[#E4405F]" href="https://www.instagram.com/heymegabyteofficial/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C8.74 0 8.333.015 7.053.072 5.775.132 4.905.333 4.14.63c-.789.306-1.459.717-2.126 1.384S.935 3.35.63 4.14C.333 4.905.131 5.775.072 7.053.012 8.333 0 8.74 0 12s.015 3.667.072 4.947c.06 1.277.261 2.148.558 2.913.306.788.717 1.459 1.384 2.126.667.666 1.336 1.079 2.126 1.384.766.296 1.636.499 2.913.558C8.333 23.988 8.74 24 12 24s3.667-.015 4.947-.072c1.277-.06 2.148-.262 2.913-.558.788-.306 1.459-.718 2.126-1.384.666-.667 1.079-1.335 1.384-2.126.296-.765.499-1.636.558-2.913.06-1.28.072-1.687.072-4.947s-.015-3.667-.072-4.947c-.06-1.277-.262-2.149-.558-2.913-.306-.789-.718-1.459-1.384-2.126C21.319 1.347 20.651.935 19.86.63c-.765-.297-1.636-.499-2.913-.558C15.667.012 15.26 0 12 0zm0 2.16c3.203 0 3.585.016 4.85.071 1.17.055 1.805.249 2.227.415.562.217.96.477 1.382.896.419.42.679.819.896 1.381.164.422.36 1.057.413 2.227.057 1.266.07 1.646.07 4.85s-.015 3.585-.074 4.85c-.061 1.17-.256 1.805-.421 2.227-.224.562-.479.96-.899 1.382-.419.419-.824.679-1.38.896-.42.164-1.065.36-2.235.413-1.274.057-1.649.07-4.859.07-3.211 0-3.586-.015-4.859-.074-1.171-.061-1.816-.256-2.236-.421-.569-.224-.96-.479-1.379-.899-.421-.419-.69-.824-.9-1.38-.165-.42-.359-1.065-.42-2.235-.045-1.26-.061-1.649-.061-4.844 0-3.196.016-3.586.061-4.861.061-1.17.255-1.814.42-2.234.21-.57.479-.96.9-1.381.419-.419.81-.689 1.379-.898.42-.166 1.051-.361 2.221-.421 1.275-.045 1.65-.06 4.859-.06l.045.03zm0 3.678c-3.405 0-6.162 2.76-6.162 6.162 0 3.405 2.76 6.162 6.162 6.162 3.405 0 6.162-2.76 6.162-6.162 0-3.405-2.76-6.162-6.162-6.162zM12 16c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm7.846-10.405c0 .795-.646 1.44-1.44 1.44-.795 0-1.44-.646-1.44-1.44 0-.794.646-1.439 1.44-1.439.793-.001 1.44.645 1.44 1.439z"/></svg></a>
      <a class="text-white flex transition-all hover:scale-[1.15] hover:-translate-y-0.5 hover:text-[#1877F2]" href="https://www.facebook.com/HeyMegabyte" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a>
    </div>
    <div class="text-[0.7rem] text-gray-500">
      <a class="text-gray-500 hover:text-primary transition-colors" href="/terms">Terms</a> &middot; <a class="text-gray-500 hover:text-primary transition-colors" href="/privacy">Privacy</a> &middot; &copy; 2026 Megabyte LLC
